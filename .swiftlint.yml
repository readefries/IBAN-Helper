# SwiftLint Configuration for RFIBAN-Helper

# Paths to include during linting
included:
  - RFIBAN-Helper
  - Example/Tests

# Paths to ignore during linting
excluded:
  - Pods
  - Example/Pods
  - DerivedData
  - .build
  - Example/RFIBANHelper.xcodeproj
  - Example/RFIBANHelper.xcworkspace

# Enabled rules
opt_in_rules:
  - array_init
  - attributes
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - convenience_type
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_header
  - first_where
  - force_unwrapping
  - function_default_parameter_at_end
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - legacy_random
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - nimble_operator
  - nslocalizedstring_key
  - number_separator
  - object_literal
  - operator_usage_whitespace
  - overridden_super_call
  - override_in_extension
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - strict_fileprivate
  - switch_case_on_newline
  - toggle_bool
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - unused_import
  - unused_private_declaration
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

# Disabled rules
disabled_rules:
  - todo # Allow TODO comments for now
  - trailing_whitespace # Can be auto-fixed

# Rule configurations
line_length:
  warning: 120
  error: 150
  ignores_function_declarations: true
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 400

function_body_length:
  warning: 60
  error: 100

file_length:
  warning: 400
  error: 500

function_parameter_count:
  warning: 5
  error: 8

type_name:
  min_length: 3
  max_length: 40
  excluded:
    - iPhone
    - URL
    - ID

identifier_name:
  min_length: 1
  max_length: 40
  excluded:
    - id
    - URL
    - GlobalAPIKey

cyclomatic_complexity:
  warning: 10
  error: 20

nesting:
  type_level:
    warning: 3
  statement_level:
    warning: 5

# Custom rules
custom_rules:
  no_print:
    name: "No Print Statements"
    regex: 'print\('
    message: "Use proper logging instead of print statements"
    severity: warning

  no_force_cast:
    name: "No Force Cast"
    regex: 'as!'
    message: "Avoid force casting, use safe casting with 'as?' instead"
    severity: error

  no_force_unwrap:
    name: "No Force Unwrap"
    regex: '!\s*\)'
    message: "Avoid force unwrapping, use safe unwrapping instead"
    severity: warning

# Reporter configuration
reporter: "xcode"

# Analyzer rules (requires SwiftLint 0.50+)
analyzer_rules:
  - explicit_self
  - unused_import